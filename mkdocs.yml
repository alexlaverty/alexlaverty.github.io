site_name: Laverty.io
site_url: https://laverty.io/
site_author: Alex Laverty
copyright: "&copy; Alex Laverty"
repo_url: https://github.com/alexlaverty/alexlaverty.github.io
repo_name: alexlaverty/alexlaverty.github.io

# No `nav:` section on purpose — navigation is generated automatically from
# the folder structure under docs/. Folders become collapsible sections in
# the left sidebar, collapsed by default.

theme:
  name: material
  custom_dir: overrides       # main.html injects the GoatCounter analytics snippet
  features:
    - navigation.indexes       # a folder's index.md acts as its section landing page
    - navigation.top           # back-to-top button
    - navigation.footer        # prev/next page links in the footer
    - toc.follow               # right-hand anchor menu follows scroll position
    - search.suggest
    - search.highlight
    - content.code.copy        # copy button on code blocks
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

hooks:
  - hooks/tag_pages.py         # per-tag listing pages + count-ordered index on tags.md
  - hooks/timeline.py          # unified home page timeline (posts + updated pages, /page/N/)

plugins:
  - blog:                      # daily log; posts live in docs/posts/
      blog_dir: .              # home page doubles as the blog index (recent posts listed there)
      post_url_format: "{date}/{slug}"
      archive_date_format: MMMM yyyy
      authors_profiles: true   # generates /author/alex/ with that author's posts
      pagination: false        # home pagination comes from hooks/timeline.py instead
  - search
  - tags                       # frontmatter tags: [...] + listing on docs/tags.md
  - git-revision-date-localized:
      type: date               # "last updated" on each page from git history
      fallback_to_build_date: true

markdown_extensions:
  - admonition                 # !!! note / warning / tip callout boxes
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true          # anchor link icon next to each heading
  - pymdownx.details           # collapsible admonitions
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences       # nested code blocks, mermaid diagrams
  - pymdownx.tabbed:
      alternate_style: true    # content tabs
  - pymdownx.tasklist:
      custom_checkbox: true    # - [x] task lists
